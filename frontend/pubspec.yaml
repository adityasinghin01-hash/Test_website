name: test_app
description: "Flutter frontend for test_app backend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Routing
  go_router: ^14.8.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Deep links
  app_links: ^6.3.3

  # reCAPTCHA v2 for signup and login

  # Environment variables
  flutter_dotenv: ^5.2.1

  # JWT decode (check expiry locally)
  jwt_decoder: ^2.0.1

  # SVG support

  # Loading skeletons

  # Typography
  google_fonts: ^6.2.1

  # Micro-animations
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
